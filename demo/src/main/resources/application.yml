# 主配置文件
spring:
  application:
    name: demo
  web:
    cors:
      mappings:
        /**:
          allowed-origins: "http://localhost:5173,http://localhost:3000"
          allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
          allowed-headers: "*"
          exposed-headers: "Content-Disposition"
          allow-credentials: true
          max-age: 3600
  # 激活的 Profile（默认为 dev）
  profiles:
    active: dev

# 应用端口
server:
  port: 8080

# 应用信息
app:
  name: Spring Boot 多环境配置示例
  version: 1.0.0
  author: 你的名字



