<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨域测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
<h1>跨域测试页面</h1>

<div>
    <button onclick="testGetUser()">测试 GET 请求</button>
    <button onclick="testGetUserList()">测试 GET 列表</button>
    <button onclick="testRegister()">测试 POST 请求</button>
</div>

<div id="result"></div>

<script>
    const API_BASE = 'http://localhost:8080';

    async function testGetUser() {
        try {
            const response = await fetch(`${API_BASE}/user/get`);
            const data = await response.json();
            displayResult('GET /user/get', data, true);
        } catch (error) {
            displayResult('GET /user/get', error, false);
        }
    }

    async function testGetUserList() {
        try {
            const response = await fetch(`${API_BASE}/user/list`);
            const data = await response.json();
            displayResult('GET /user/list', data, true);
        } catch (error) {
            displayResult('GET /user/list', error, false);
        }
    }

    async function testRegister() {
        try {
            const response = await fetch(`${API_BASE}/user/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: 'testuser',
                    password: 'Password123',
                    confirmPassword: 'Password123',
                    email: 'test@example.com',
                    age: 20
                })
            });
            const data = await response.json();
            displayResult('POST /user/register', data, true);
        } catch (error) {
            displayResult('POST /user/register', error, false);
        }
    }

    function displayResult(title, data, success) {
        const resultDiv = document.getElementById('result');
        const className = success ? 'success' : 'error';
        const message = success ? '成功' : '失败';
        resultDiv.innerHTML = `
                <p class="${className}">${title} - ${message}</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
    }
</script>
</body>
</html>
