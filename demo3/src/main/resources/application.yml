# 主配置文件
spring:
  application:
    name: demo

  # 激活的 Profile（默认为 dev）
  profiles:
    active: dev

# 应用端口
server:
  port: 8080

springdoc:
  # API 文档基本信息
  api-docs:
    # API 文档访问路径
    path: /v3/api-docs
  # 分组配置
  group-configs:
    # 按标签分组
    group-by: tags
    # 按包分组
    # package-configs: com.example.demo.controller
  # Swagger UI 配置
  swagger-ui:
    # Swagger UI 访问路径
    path: /swagger-ui.html
    # 默认展开的标签
    default-models-expand-depth: 2
    # 默认展开的级别
    default-model-expand-depth: 2
    # 显示请求时长
    display-request-duration: true
    # 按字母顺序排序
    operations-sorter: alpha
    # 标签排序器
    tags-sorter: alpha
    # 是否启用
    enabled: true

# 应用信息（用于文档显示）
app:
  name: ${spring.application.name}
  version: 1.0.0
  description: Spring Boot API 文档示例
