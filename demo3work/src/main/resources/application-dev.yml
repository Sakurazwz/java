# 开发环境配置
server:
  port: 8080

spring:
  # 数据源配置（暂时使用 H2 内存数据库）
  datasource:
    url: jdbc:h2:mem:devdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 数据库控制台
  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis 配置（如果本地安装了 Redis，可以启用）
  redis:
    host: localhost
    port: 6379
    database: 0

# 日志配置
logging:
  level:
    root: INFO
    com.example.demo: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用配置
app:
  environment: 开发环境
  debug: true

# 自定义配置
custom:
  upload-path: D:/upload/dev
  max-file-size: 10MB